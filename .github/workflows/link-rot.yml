name: "Link Rot Check"
# 주간 외부 링크 깨짐 점검. 뉴스·연구 스크랩 글은 외부 링크가 많아 링크 부패에 취약.
# 깨진 링크 발견 시 이슈로 보고(자동 수정 안 함).
on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in posts (lychee)
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            --exclude-mail
            "_posts/**/*.md" "_drafts/**/*.md"
          fail: false

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Link rot 발견 — 주간 점검"
          content-filepath: ./lychee/out.md
          labels: link-rot, maintenance
